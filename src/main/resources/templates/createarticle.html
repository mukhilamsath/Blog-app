<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Post | SocialBlog</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fafafa;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 470px;
            margin-top: 60px;
            background-color: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            padding: 24px;
            box-sizing: border-box;
        }
        h2 {
            font-weight: 600;
            font-size: 20px;
            text-align: center;
            margin-top: 0;
            margin-bottom: 24px;
        }
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #262626;
        }
        .form-control {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #dbdbdb;
            border-radius: 6px;
            background-color: #fafafa;
            font-size: 14px;
            margin-bottom: 16px;
            box-sizing: border-box;
            outline: none;
        }
        .form-control:focus {
            border-color: #a8a8a8;
        }
        textarea.form-control {
            resize: vertical;
        }
        .btn-primary {
            width: 100%;
            background-color: #0095f6;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-primary:hover {
            background-color: #1877f2;
        }
        .image-preview {
            width: 100%;
            border-radius: 6px;
            margin-bottom: 16px;
            display: none;
            object-fit: cover;
            max-height: 400px;
        }
        .file-upload-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
            text-align: center;
            border: 2px dashed #dbdbdb;
            border-radius: 6px;
            padding: 30px 0;
            margin-bottom: 16px;
            cursor: pointer;
        }
        .file-upload-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }
        .upload-icon {
            font-size: 24px;
            color: #0095f6;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Create new post</h2>

    <form th:action="@{/articles/save}" th:object="${article}" method="post" enctype="multipart/form-data">
        
        <div class="file-upload-wrapper" id="drop-area">
            <div class="upload-icon">📸</div>
            <p style="margin: 8px 0 0 0; color: #8e8e8e; font-size: 14px;">Click to upload image</p>
            <input type="file" name="imageFile" id="imageFile" accept="image/png, image/jpeg" required onchange="previewImage(event)" />
        </div>
        <img id="image-preview" class="image-preview" />

        <label class="form-label">Title</label>
        <input type="text" th:field="*{title}" class="form-control" placeholder="Catchy title..." required />

        <label class="form-label">Subtitle (Optional)</label>
        <input type="text" th:field="*{subtitle}" class="form-control" placeholder="Add a subtitle" />

        <label class="form-label">Caption / Body</label>
        <textarea th:field="*{body}" class="form-control" rows="4" placeholder="Write a caption..." required></textarea>

        <!-- Hidden Author ID -->
        <input type="hidden" name="authorId" value="1" />

        <button type="submit" class="btn-primary">Share</button>
    </form>
</div>

<script>
    function previewImage(event) {
        const reader = new FileReader();
        reader.onload = function() {
            const output = document.getElementById('image-preview');
            output.src = reader.result;
            output.style.display = 'block';
            document.getElementById('drop-area').style.display = 'none';
        }
        if(event.target.files[0]) {
            reader.readAsDataURL(event.target.files[0]);
        }
    }
</script>
</body>
</html>
