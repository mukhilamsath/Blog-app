<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Article</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Create a New Article</h2>

    <form th:action="@{/articles/save}" th:object="${articleForm}" method="post">
        <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" th:field="*{title}" class="form-control" required />
        </div>

        <div class="mb-3">
            <label class="form-label">Subtitle</label>
            <input type="text" th:field="*{subtitle}" class="form-control" />
        </div>

        <div class="mb-3">
            <label class="form-label">Body</label>
            <textarea th:field="*{body}" class="form-control" rows="6" required></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Author ID</label>
            <input type="number" name="authorId" class="form-control" required />
        </div>

        <button type="submit" class="btn btn-primary">Publish</button>
    </form>
</div>
</body>
</html>
